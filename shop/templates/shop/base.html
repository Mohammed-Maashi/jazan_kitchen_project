<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ store_name }}{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/site.css">
</head>

<body class="bg-soft">
<nav class="navbar navbar-expand-lg nav-glass sticky-top">
  <div class="container">
    <a class="navbar-brand fw-extrabold" href="{% url 'home' %}">
      مطبخ جازان الإلكتروني
      <span class="badge rounded-pill ms-2 brand-badge">جديد</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto gap-2">
        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">الرئيسية</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">تواصل معنا</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'checkout' %}">السلة</a></li>
      </ul>

      <div class="d-flex gap-2">
        {% if user.is_authenticated %}
          <a class="btn btn-primary btn-sm px-3" href="{% url 'profile' %}">حسابي</a>
          <a class="btn btn-outline-light btn-sm px-3" href="{% url 'logout' %}">تسجيل الخروج</a>
        {% else %}
          <a class="btn btn-outline-light btn-sm px-3" href="{% url 'login' %}">تسجيل الدخول</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<footer class="py-4 mt-5 footer-soft">
  <div class="container d-flex justify-content-between flex-wrap gap-2">
    <div class="text-muted small">© {% now "Y" %} مطبخ جازان الإلكتروني — جميع الحقوق محفوظة</div>

    <!-- ✅ استبدال العبارة الإنجليزية بعبارة عربية تهم الزبون -->
    <div class="text-muted small">توصيل سريع • طبخ منزلي • نكهات جازانية • دفع آمن</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
